version: '3.8'

services:
  app:
    build: .
    container_name: mnvg_backend
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://mnvg_user:${DB_PASSWORD:-pass}@db:3306/mnvg_gold
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mysql:8.0
    container_name: mnvg_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: mnvg_gold
      MYSQL_USER: mnvg_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-pass}
    ports:
      - "3307:3306" # Expose internally for local DB tools if needed
    volumes:
      - mnvg_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

volumes:
  mnvg_data:
